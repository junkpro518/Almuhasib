services:
  almuhasib:
    build: .
    image: almuhasib:latest
    container_name: almuhasib
    restart: unless-stopped
    env_file:
      - path: .runtime.env
        format: raw
    expose:
      - "8080"
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.almuhasib.rule=Host(`almuhasib.mohammed518.com`)"
      - "traefik.http.routers.almuhasib.entrypoints=websecure"
      - "traefik.http.routers.almuhasib.tls=true"
      - "traefik.http.routers.almuhasib.tls.certresolver=myresolver"
      - "traefik.http.services.almuhasib.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('127.0.0.1', 8080), 5); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  proxy:
    external: true
